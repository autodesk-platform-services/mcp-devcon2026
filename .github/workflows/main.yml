name: Deploy VitePress to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        env:
          # Optional override. When unset, base path is derived from repo name in CI.
          VITEPRESS_BASE_PATH: ${{ vars.VITEPRESS_BASE_PATH }}
        run: |
          if [ -z "$VITEPRESS_BASE_PATH" ] && [ "$GITHUB_ACTIONS" = "true" ] && [ -n "$GITHUB_REPOSITORY" ]; then
            repo_name="${GITHUB_REPOSITORY#*/}"
            export VITEPRESS_BASE_PATH="/${repo_name}/"
          fi

          echo "Using VITEPRESS_BASE_PATH=${VITEPRESS_BASE_PATH:-/}"
          npm run build

      - name: Verify VitePress output
        run: test -f .vitepress/dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
